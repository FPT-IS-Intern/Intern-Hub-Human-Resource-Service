databaseChangeLog:
  - changeSet:
      id: 005-registration-staging-user-info-temp
      author: copilot
      changes:
        - sql:
            dbms: postgresql
            splitStatements: false
            sql: |
              ALTER TABLE tickets ALTER COLUMN user_id DROP NOT NULL;

              ALTER TABLE tickets
                ADD COLUMN IF NOT EXISTS user_info_temp jsonb DEFAULT '{}'::jsonb;

              DO $$
              BEGIN
                IF EXISTS (
                  SELECT 1
                  FROM information_schema.columns
                  WHERE table_name = 'tickets'
                  AND column_name = 'user_info_temp'
                ) THEN
                  UPDATE tickets
                  SET user_info_temp = COALESCE(user_info_temp, user_info_temp, '{}'::jsonb)
                  WHERE user_info_temp IS NULL
                     OR user_info_temp = '{}'::jsonb;
                END IF;
              END
              $$;