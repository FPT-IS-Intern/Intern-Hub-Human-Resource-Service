databaseChangeLog:
  - changeSet:
      id: 003-attendance-performance-indexes
      author: codex
      changes:
        - createIndex:
            tableName: attendance_logs
            indexName: idx_attendance_user_work_date
            columns:
              - column:
                  name: user_id
              - column:
                  name: work_date

        - createIndex:
            tableName: attendance_logs
            indexName: idx_attendance_user_work_date_check_in_time
            columns:
              - column:
                  name: user_id
              - column:
                  name: work_date
              - column:
                  name: check_in_time

        - createIndex:
            tableName: attendance_logs
            indexName: idx_attendance_user_work_date_check_out_time
            columns:
              - column:
                  name: user_id
              - column:
                  name: work_date
              - column:
                  name: check_out_time

        - createIndex:
            tableName: attendance_logs
            indexName: idx_attendance_user_work_date_check_in_branch
            columns:
              - column:
                  name: user_id
              - column:
                  name: work_date
              - column:
                  name: check_in_branch_id
