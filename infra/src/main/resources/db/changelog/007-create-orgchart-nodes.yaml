databaseChangeLog:
  - changeSet:
      id: 007-create-orgchart-nodes
      author: codex
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS org_chart_nodes (
                org_chart_node_id BIGSERIAL PRIMARY KEY,
                user_id BIGINT NOT NULL,
                parent_user_id BIGINT,
                is_root BOOLEAN NOT NULL DEFAULT FALSE,
                version INTEGER,
                created_at BIGINT,
                updated_at BIGINT,
                created_by VARCHAR(255),
                updated_by VARCHAR(255),
                CONSTRAINT uk_org_chart_nodes_user UNIQUE (user_id),
                CONSTRAINT fk_org_chart_nodes_user FOREIGN KEY (user_id) REFERENCES users(user_id) ON DELETE CASCADE,
                CONSTRAINT fk_org_chart_nodes_parent FOREIGN KEY (parent_user_id) REFERENCES users(user_id) ON DELETE SET NULL,
                CONSTRAINT chk_org_chart_nodes_self_parent CHECK (user_id <> parent_user_id)
              );

              CREATE UNIQUE INDEX IF NOT EXISTS uk_org_chart_nodes_root
              ON org_chart_nodes (is_root)
              WHERE is_root = TRUE;
