databaseChangeLog:
  - changeSet:
      id: 017-create-ticket-approvals-table
      author: hrm-service
      changes:
        - createTable:
            tableName: ticket_approvals
            columns:
              - column:
                  name: approval_id
                  type: bigint
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: approver_id
                  type: bigint
              - column:
                  name: ticket_id
                  type: bigint
              - column:
                  name: action
                  type: varchar(50)
              - column:
                  name: comment
                  type: text
              - column:
                  name: action_at
                  type: date
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: version
                  type: integer
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: created_by
                  type: bigint
              - column:
                  name: updated_by
                  type: bigint
        - addForeignKeyConstraint:
            constraintName: fk_ticket_approvals_approver
            baseTableName: ticket_approvals
            baseColumnNames: approver_id
            referencedTableName: users
            referencedColumnNames: user_id
        - addForeignKeyConstraint:
            constraintName: fk_ticket_approvals_ticket
            baseTableName: ticket_approvals
            baseColumnNames: ticket_id
            referencedTableName: tickets
            referencedColumnNames: ticket_id