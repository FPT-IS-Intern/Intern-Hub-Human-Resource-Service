databaseChangeLog:
  - changeSet:
      id: 015-create-quick-notes-table
      author: hrm-service
      changes:
        - createTable:
            tableName: quick_notes
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: intern_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: writer_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: write_date
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: version
                  type: integer
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: updated_by
                  type: bigint
              - column:
                  name: created_by
                  type: bigint
        - addForeignKeyConstraint:
            constraintName: fk_quick_notes_intern
            baseTableName: quick_notes
            baseColumnNames: intern_id
            referencedTableName: users
            referencedColumnNames: user_id
        - addForeignKeyConstraint:
            constraintName: fk_quick_notes_writer
            baseTableName: quick_notes
            baseColumnNames: writer_id
            referencedTableName: users
            referencedColumnNames: user_id