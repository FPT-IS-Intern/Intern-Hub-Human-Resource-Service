databaseChangeLog:
  - changeSet:
      id: 014-create-org-chart-nodes-table
      author: hrm-service
      changes:
        - createTable:
            tableName: org_chart_nodes
            columns:
              - column:
                  name: org_chart_node_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: parent_user_id
                  type: bigint
              - column:
                  name: is_root
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: created_by
                  type: bigint
              - column:
                  name: updated_by
                  type: bigint
        - addForeignKeyConstraint:
            constraintName: fk_org_chart_nodes_user
            baseTableName: org_chart_nodes
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: user_id
        - addForeignKeyConstraint:
            constraintName: fk_org_chart_nodes_parent_user
            baseTableName: org_chart_nodes
            baseColumnNames: parent_user_id
            referencedTableName: users
            referencedColumnNames: user_id