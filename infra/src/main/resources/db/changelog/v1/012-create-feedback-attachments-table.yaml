databaseChangeLog:
  - changeSet:
      id: 012-create-feedback-attachments-table
      author: hrm-service
      changes:
        - createTable:
            tableName: feedback_attachments
            columns:
              - column:
                  name: attachment_id
                  type: bigint
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: message_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: uploader_id
                  type: bigint
              - column:
                  name: file_name
                  type: varchar(255)
              - column:
                  name: file_url
                  type: text
              - column:
                  name: uploaded_at
                  type: bigint
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: version
                  type: integer
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: file_type
                  type: text
              - column:
                  name: file_size
                  type: text
              - column:
                  name: created_by
                  type: bigint
              - column:
                  name: updated_by
                  type: bigint
        - addForeignKeyConstraint:
            constraintName: fk_feedback_attachments_message
            baseTableName: feedback_attachments
            baseColumnNames: message_id
            referencedTableName: feedback_messages
            referencedColumnNames: message_id
        - addForeignKeyConstraint:
            constraintName: fk_feedback_attachments_uploader
            baseTableName: feedback_attachments
            baseColumnNames: uploader_id
            referencedTableName: users
            referencedColumnNames: user_id