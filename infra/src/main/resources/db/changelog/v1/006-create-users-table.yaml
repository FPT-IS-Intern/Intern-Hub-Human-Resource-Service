databaseChangeLog:
  - changeSet:
      id: 006-create-users-table
      author: hrm-service
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: position_id
                  type: bigint
              - column:
                  name: mentor_id
                  type: bigint
              - column:
                  name: department_id
                  type: bigint
              - column:
                  name: full_name
                  type: varchar(100)
              - column:
                  name: id_number
                  type: varchar(12)
              - column:
                  name: date_of_birth
                  type: date
              - column:
                  name: company_email
                  type: varchar(100)
              - column:
                  name: phone_number
                  type: varchar(20)
              - column:
                  name: internship_start_date
                  type: date
              - column:
                  name: internship_end_date
                  type: date
              - column:
                  name: address
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: sys_status
                  type: varchar(20)
              - column:
                  name: is_face_registry
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: is_learner
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: username
                  type: varchar(100)
              - column:
                  name: avatar_url
                  type: text
              - column:
                  name: cv_url
                  type: text
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: created_by
                  type: bigint
              - column:
                  name: updated_by
                  type: bigint
        - addForeignKeyConstraint:
            constraintName: fk_users_position
            baseTableName: users
            baseColumnNames: position_id
            referencedTableName: positions
            referencedColumnNames: position_id
        - addForeignKeyConstraint:
            constraintName: fk_users_mentor
            baseTableName: users
            baseColumnNames: mentor_id
            referencedTableName: users
            referencedColumnNames: user_id
        - addForeignKeyConstraint:
            constraintName: fk_users_department
            baseTableName: users
            baseColumnNames: department_id
            referencedTableName: departments
            referencedColumnNames: department_id