databaseChangeLog:
  - changeSet:
      id: 010-create-attendance-logs-table
      author: hrm-service
      changes:
        - createTable:
            tableName: attendance_logs
            columns:
              - column:
                  name: attendance_id
                  type: bigint
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: user_id
                  type: bigint
              - column:
                  name: work_date
                  type: date
              - column:
                  name: check_in_time
                  type: bigint
              - column:
                  name: check_out_time
                  type: bigint
              - column:
                  name: attendance_status
                  type: varchar(20)
              - column:
                  name: source
                  type: varchar(50)
              - column:
                  name: check_in_branch_id
                  type: uuid
              - column:
                  name: check_out_branch_id
                  type: uuid
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: version
                  type: integer
              - column:
                  name: created_by
                  type: bigint
              - column:
                  name: updated_by
                  type: bigint
              - column:
                  name: status
                  type: varchar(50)
        - addForeignKeyConstraint:
            constraintName: fk_attendance_logs_user
            baseTableName: attendance_logs
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: user_id