databaseChangeLog:
  - changeSet:
      id: 014-feedback_attachments
      author: cline
      changes:
        - createTable:
            tableName: feedback_attachments
            columns:
              - column:
                  name: attachment_id
                  type: bigint
                  constraints:
                    primaryKey: true
              - column:
                  name: message_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: feedback_id
                  type: bigint
              - column:
                  name: uploader_id
                  type: bigint
              - column:
                  name: file_name
                  type: varchar(255)
              - column:
                  name: file_url
                  type: text
              - column:
                  name: uploaded_at
                  type: bigint
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: version
                  type: integer
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: file_type
                  type: varchar(100)
              - column:
                  name: file_size
                  type: bigint

        - addForeignKeyConstraint:
            baseTableName: feedback_attachments
            baseColumnNames: message_id
            referencedTableName: feedback_messages
            referencedColumnNames: message_id
            constraintName: fk_feedback_attachments_message
        - addForeignKeyConstraint:
            baseTableName: feedback_attachments
            baseColumnNames: feedback_id
            referencedTableName: anonymous_feedbacks
            referencedColumnNames: feedback_id
            constraintName: fk_feedback_attachments_feedback
        - addForeignKeyConstraint:
            baseTableName: feedback_attachments
            baseColumnNames: uploader_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_feedback_attachments_uploader