databaseChangeLog:
  - changeSet:
      id: 003-users
      author: cline
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    primaryKey: true
              - column:
                  name: position_id
                  type: bigint
              - column:
                  name: mentor_id
                  type: bigint
              - column:
                  name: full_name
                  type: varchar(100)
              - column:
                  name: id_number
                  type: varchar(12)
              - column:
                  name: date_of_birth
                  type: date
              - column:
                  name: company_email
                  type: varchar(100)
              - column:
                  name: phone_number
                  type: varchar(20)
              - column:
                  name: address
                  type: text
              - column:
                  name: sys_status
                  type: varchar(50)
              - column:
                  name: internship_start_date
                  type: date
              - column:
                  name: internship_end_date
                  type: date
              - column:
                  name: is_face_registry
                  type: boolean
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: version
                  type: integer
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: updated_by
                  type: varchar(255)

        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: position_id
            referencedTableName: positions
            referencedColumnNames: position_id
            constraintName: fk_users_position
        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: mentor_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_users_mentor