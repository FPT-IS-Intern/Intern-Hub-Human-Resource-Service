databaseChangeLog:
  - changeSet:
      id: 020-fix-missing-columns-1
      author: cline
      changes:
        - createTable:
            tableName: departments
            columns:
              - column:
                  name: department_id
                  type: bigint
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(100)
              - column:
                  name: code
                  type: varchar(50)
              - column:
                  name: description
                  type: text
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: version
                  type: integer
              - column:
                  name: created_by
                  type: bigint
              - column:
                  name: updated_by
                  type: bigint

  - changeSet:
      id: 020-fix-missing-columns-2
      author: cline
      changes:
        - createTable:
            tableName: evidences
            columns:
              - column:
                  name: evidence_id
                  type: bigint
                  constraints:
                    primaryKey: true
              - column:
                  name: ticket_id
                  type: bigint
              - column:
                  name: evidence_folder
                  type: varchar(255)
              - column:
                  name: evidence_url
                  type: text
              - column:
                  name: uploaded_at
                  type: date
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: version
                  type: integer
              - column:
                  name: created_by
                  type: bigint
              - column:
                  name: updated_by
                  type: bigint
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: create_at
                  type: bigint
              - column:
                  name: created_at
                  type: bigint
        - addForeignKeyConstraint:
            baseTableName: evidences
            baseColumnNames: ticket_id
            referencedTableName: tickets
            referencedColumnNames: ticket_id
            constraintName: fk_evidences_ticket

  - changeSet:
      id: 020-fix-missing-columns-3
      author: cline
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: department_id
                  type: bigint
              - column:
                  name: is_learner
                  type: boolean
                  defaultValue: false
              - column:
                  name: username
                  type: varchar(100)
              - column:
                  name: avatar_url
                  type: text
              - column:
                  name: cv_url
                  type: text
        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: department_id
            referencedTableName: departments
            referencedColumnNames: department_id
            constraintName: fk_users_department

  - changeSet:
      id: 020-fix-missing-columns-4
      author: cline
      changes:
        - addColumn:
            tableName: remote_requests
            columns:
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: created_by
                  type: bigint
              - column:
                  name: updated_by
                  type: bigint

  - changeSet:
      id: 020-fix-missing-columns-5
      author: cline
      changes:
        - addColumn:
            tableName: anonymous_feedbacks
            columns:
              - column:
                  name: sender_id
                  type: bigint
        - addForeignKeyConstraint:
            baseTableName: anonymous_feedbacks
            baseColumnNames: sender_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_anonymous_feedbacks_sender

  - changeSet:
      id: 020-fix-missing-columns-6
      author: cline
      changes:
        - dropForeignKeyConstraint:
            baseTableName: anonymous_feedbacks
            constraintName: fk_anonymous_feedbacks_creator
        - renameColumn:
            tableName: anonymous_feedbacks
            oldColumnName: creator_id
            newColumnName: creator
            columnDataType: bigint
        - addForeignKeyConstraint:
            baseTableName: anonymous_feedbacks
            baseColumnNames: creator
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_anonymous_feedbacks_creator

  - changeSet:
      id: 020-fix-missing-columns-7
      author: cline
      changes:
        - addColumn:
            tableName: feedback_attachments
            columns:
              - column:
                  name: created_by
                  type: bigint
              - column:
                  name: updated_by
                  type: bigint
        - modifyDataType:
            tableName: feedback_attachments
            columnName: file_size
            newDataType: varchar(255)

  - changeSet:
      id: 020-fix-missing-columns-8
      author: cline
      changes:
        - addColumn:
            tableName: feedback_messages
            columns:
              - column:
                  name: created_by
                  type: bigint
              - column:
                  name: updated_by
                  type: bigint

  - changeSet:
      id: 020-fix-missing-columns-9
      author: cline
      changes:
        - dropForeignKeyConstraint:
            baseTableName: anonymous_feedbacks
            constraintName: fk_anonymous_feedbacks_feedback_type
        - renameColumn:
            tableName: feedback_types
            oldColumnName: id
            newColumnName: feedback_type_id
            columnDataType: bigint
        - addForeignKeyConstraint:
            baseTableName: anonymous_feedbacks
            baseColumnNames: feedback_type_id
            referencedTableName: feedback_types
            referencedColumnNames: feedback_type_id
            constraintName: fk_anonymous_feedbacks_feedback_type
