databaseChangeLog:
  - changeSet:
      id: 013-feedback_messages
      author: cline
      changes:
        - createTable:
            tableName: feedback_messages
            columns:
              - column:
                  name: message_id
                  type: bigint
                  constraints:
                    primaryKey: true
              - column:
                  name: feedback_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: parent_message_id
                  type: bigint
              - column:
                  name: sender_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: sender_role
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: version
                  type: integer
              - column:
                  name: status
                  type: varchar(50)

        - addForeignKeyConstraint:
            baseTableName: feedback_messages
            baseColumnNames: feedback_id
            referencedTableName: anonymous_feedbacks
            referencedColumnNames: feedback_id
            constraintName: fk_feedback_messages_feedback
        - addForeignKeyConstraint:
            baseTableName: feedback_messages
            baseColumnNames: parent_message_id
            referencedTableName: feedback_messages
            referencedColumnNames: message_id
            constraintName: fk_feedback_messages_parent
        - addForeignKeyConstraint:
            baseTableName: feedback_messages
            baseColumnNames: sender_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_feedback_messages_sender