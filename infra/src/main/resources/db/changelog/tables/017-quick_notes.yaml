databaseChangeLog:
  - changeSet:
      id: 017-quick_notes
      author: cline
      changes:
        - createTable:
            tableName: quick_notes
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
              - column:
                  name: intern_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: writer_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: write_date
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: version
                  type: integer
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: updated_by
                  type: varchar(255)
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValue: false

        - addForeignKeyConstraint:
            baseTableName: quick_notes
            baseColumnNames: intern_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_quick_note_intern
        - addForeignKeyConstraint:
            baseTableName: quick_notes
            baseColumnNames: writer_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_quick_note_writer