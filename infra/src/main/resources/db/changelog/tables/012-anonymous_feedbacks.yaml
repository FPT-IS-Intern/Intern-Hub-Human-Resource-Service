databaseChangeLog:
  - changeSet:
      id: 012-anonymous_feedbacks
      author: cline
      changes:
        - createTable:
            tableName: anonymous_feedbacks
            columns:
              - column:
                  name: feedback_id
                  type: bigint
                  constraints:
                    primaryKey: true
              - column:
                  name: feedback_type_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
              - column:
                  name: content
                  type: text
              - column:
                  name: creator_id
                  type: bigint
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: version
                  type: integer
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: updated_by
                  type: varchar(255)

        - addForeignKeyConstraint:
            baseTableName: anonymous_feedbacks
            baseColumnNames: feedback_type_id
            referencedTableName: feedback_types
            referencedColumnNames: id
            constraintName: fk_anonymous_feedbacks_feedback_type
        - addForeignKeyConstraint:
            baseTableName: anonymous_feedbacks
            baseColumnNames: creator_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_anonymous_feedbacks_creator