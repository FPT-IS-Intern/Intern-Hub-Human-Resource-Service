databaseChangeLog:
  - changeSet:
      id: 018-org_chart_nodes
      author: cline
      changes:
        - createTable:
            tableName: org_chart_nodes
            columns:
              - column:
                  name: org_chart_node_id
                  type: bigserial
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: parent_user_id
                  type: bigint
              - column:
                  name: is_root
                  type: boolean
                  constraints:
                    nullable: false
                  defaultValue: "false"
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: version
                  type: integer
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: updated_by
                  type: varchar(255)

        - addForeignKeyConstraint:
            baseTableName: org_chart_nodes
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_org_chart_nodes_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: org_chart_nodes
            baseColumnNames: parent_user_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_org_chart_nodes_parent
            onDelete: SET NULL
