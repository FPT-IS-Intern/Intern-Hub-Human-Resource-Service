databaseChangeLog:
  - changeSet:
      id: 010-attendance_logs
      author: cline
      changes:
        - createTable:
            tableName: attendance_logs
            columns:
              - column:
                  name: attendance_id
                  type: bigint
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: bigint
              - column:
                  name: work_date
                  type: date
              - column:
                  name: check_in_time
                  type: bigint
              - column:
                  name: check_out_time
                  type: bigint
              - column:
                  name: attendance_status
                  type: varchar(20)
              - column:
                  name: source
                  type: varchar(50)
              - column:
                  name: is_check_in_valid
                  type: boolean
              - column:
                  name: is_check_out_valid
                  type: boolean
              - column:
                  name: check_in_branch_id
                  type: uuid
              - column:
                  name: check_out_branch_id
                  type: uuid
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: version
                  type: integer
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: updated_by
                  type: varchar(255)

        - addForeignKeyConstraint:
            baseTableName: attendance_logs
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_attendance_logs_user