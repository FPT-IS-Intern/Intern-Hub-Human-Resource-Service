databaseChangeLog:
  - changeSet:
      id: 006-leave_types
      author: cline
      changes:
        - createTable:
            tableName: leave_types
            columns:
              - column:
                  name: leave_type_id
                  type: bigint
                  constraints:
                    primaryKey: true
              - column:
                  name: type_name
                  type: varchar(255)
              - column:
                  name: description
                  type: text
              - column:
                  name: created_at
                  type: bigint
              - column:
                  name: updated_at
                  type: bigint
              - column:
                  name: version
                  type: integer
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: updated_by
                  type: varchar(255)